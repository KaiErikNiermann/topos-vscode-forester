name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run check-types

      - name: Lint
        run: pnpm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (esbuild bundles)
        run: node esbuild.js

      - name: Formatter tests
        run: pnpm run test:formatter

      - name: Langium grammar tests
        run: pnpm run test:langium-grammar

      - name: LaTeX hover tests
        run: pnpm run test:latex-hover

      - name: Tag closure inlay tests
        run: pnpm run test:tag-closure-inlay

      - name: Subtree auto-ID tests
        run: pnpm run test:subtree-auto-id

      - name: Grammar corpus conformance tests
        run: pnpm run test:corpus

  lsp-standalone:
    name: Language Server Standalone
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build language server
        run: node esbuild.js

      - name: Test LSP initialize handshake
        run: |
          node -e "
          const { spawn } = require('child_process');
          const server = spawn('node', ['out/language/main.js', '--stdio']);
          const initRequest = JSON.stringify({
            jsonrpc: '2.0', id: 1, method: 'initialize',
            params: { capabilities: {}, rootUri: null, processId: process.pid }
          });
          const msg = 'Content-Length: ' + Buffer.byteLength(initRequest) + '\r\n\r\n' + initRequest;
          let data = '';
          server.stdout.on('data', chunk => { data += chunk; });
          server.stdin.write(msg);
          setTimeout(() => {
            if (!data.includes('\"id\":1')) {
              console.error('No valid initialize response received');
              console.error('Got:', data.slice(0, 500));
              process.exit(1);
            }
            console.log('LSP initialize handshake OK');
            server.kill();
            process.exit(0);
          }, 5000);
          server.on('error', err => { console.error(err); process.exit(1); });
          "

  neovim-lint:
    name: Neovim Plugin Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq lua-check

      - name: Lint Neovim plugin
        run: |
          luacheck editors/neovim/lua/ editors/neovim/plugin/ \
            --globals vim \
            --no-unused-args \
            --max-line-length 120
