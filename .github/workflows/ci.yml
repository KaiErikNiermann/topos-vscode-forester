name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run check-types

      - name: Lint
        run: pnpm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (esbuild bundles)
        run: node esbuild.js

      - name: Formatter tests
        run: pnpm run test:formatter

      - name: Langium grammar tests
        run: pnpm run test:langium-grammar

      - name: LaTeX hover tests
        run: pnpm run test:latex-hover

      - name: Tag closure inlay tests
        run: pnpm run test:tag-closure-inlay

      - name: Subtree auto-ID tests
        run: pnpm run test:subtree-auto-id
